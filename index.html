  <script>
    (function() {
      const tripId = new URLSearchParams(location.search).get('trip') || '';
      const startUrl = location.origin + location.pathname + (tripId ? '?trip=' + tripId : '');
      const manifest = {
        name: '여행 계획판',
        short_name: '여행앱',
        start_url: startUrl,
        display: 'standalone',
        background_color: '#ffffff',
        theme_color: '#1a1a2e',
        icons: [{
          src: 'https://raw.githubusercontent.com/yessalbi/Travel/main/icon_new.png',
          sizes: '192x192',
          type: 'image/png'
        }]
      };
      const encoded = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
      document.getElementById('dynamic-manifest').href = encoded;
    })();
  </script>

  const db = firebase.firestore();

  window.fbSaveTrip = async (tripId, data) => {
    await db.collection("trips").doc(tripId).set(data, { merge: true });
  };
  window.fbGetTrip = async (tripId) => {
    const snap = await db.collection("trips").doc(tripId).get();
    return snap.exists ? snap.data() : null;
  };
  window.fbAddPlace = async (tripId, place) => {
    const ref = await db.collection("trips").doc(tripId).collection("places").add(place);
    return ref.id;
  };
  window.fbDeletePlace = async (tripId, placeId) => {
    await db.collection("trips").doc(tripId).collection("places").doc(placeId).delete();
  };

  window.fbSetArchived = async (tripId, archived) => {
    await db.collection("trips").doc(tripId).set({ isArchived: archived }, { merge: true });
  };
  window.fbDeleteTrip = async (tripId) => {
    const places = await db.collection("trips").doc(tripId).collection("places").get();
    const batch = db.batch();
    places.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    await db.collection("trips").doc(tripId).delete();
  };
  window.fbWatchPlaces = (tripId, cb) => {
    return db.collection("trips").doc(tripId).collection("places").onSnapshot(snap => {
      const places = [];
      snap.forEach(d => places.push({ id: d.id, ...d.data() }));
      cb(places);
    });
  };
  window.fbUpdatePlace = async (tripId, placeId, data) => {
    await db.collection("trips").doc(tripId).collection("places").doc(placeId).update(data);
  };
