<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAKSU95SekZf2Mwb_ojLbUddMLMCOgbRSQ",
    authDomain: "cyh-travel.firebaseapp.com",
    databaseURL: "https://cyh-travel-default-rtdb.firebaseio.com",
    projectId: "cyh-travel",
    storageBucket: "cyh-travel.firebasestorage.app",
    messagingSenderId: "423848709658",
    appId: "1:423848709658:web:2521fb48726fcf96adcba3"
  });
  const db = firebase.firestore();

  window.fbSaveTrip = async (tripId, data) => {
    await db.collection("trips").doc(tripId).set(data, { merge: true });
  };
  window.fbGetTrip = async (tripId) => {
    const snap = await db.collection("trips").doc(tripId).get();
    return snap.exists ? snap.data() : null;
  };
  window.fbAddPlace = async (tripId, place) => {
    const ref = await db.collection("trips").doc(tripId).collection("places").add(place);
    return ref.id;
  };
  window.fbDeletePlace = async (tripId, placeId) => {
    await db.collection("trips").doc(tripId).collection("places").doc(placeId).delete();
  };
  window.fbWatchPlaces = (tripId, cb) => {
    return db.collection("trips").doc(tripId).collection("places").onSnapshot(snap => {
      const places = [];
      snap.forEach(d => places.push({ id: d.id, ...d.data() }));
      cb(places);
    });
  };
  window.fbUpdatePlace = async (tripId, placeId, data) => {
    await db.collection("trips").doc(tripId).collection("places").doc(placeId).update(data);
  };
</script>

<style>
:root {
  --cream:   #FAFAF7;
  --white:   #FFFFFF;
  --stone:   #F2F0EB;
  --sand:    #E8E4DC;
  --ink:     #1A1A18;
  --ink2:    #3D3D38;
  --ink3:    #6B6B64;
  --accent:  #E07A3A;
  --accent2: #3A8FE0;
  --green:   #3AAF7A;
  --red:     #E03A3A;
  --shadow:  0 4px 24px rgba(0,0,0,0.08);
  --shadow2: 0 2px 12px rgba(0,0,0,0.06);
  --r:       14px;
  --r2:      10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
}

/* ── 헤더 ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px;
  background: rgba(250,250,247,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--sand);
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px;
}
#header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: var(--ink); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#header h1 span { color: var(--accent); }
.header-btn {
  border: none; cursor: pointer; border-radius: 8px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 7px 14px; transition: all .18s;
}
.header-btn.primary {
  background: var(--accent); color: #fff;
}
.header-btn.primary:hover { background: #c96a2e; }
.header-btn.ghost {
  background: var(--stone); color: var(--ink2);
  border: 1px solid var(--sand);
}
.header-btn.ghost:hover { background: var(--sand); }
#trip-id-badge {
  font-size: 11px; color: var(--ink3); background: var(--stone);
  border: 1px solid var(--sand); border-radius: 6px;
  padding: 4px 10px; white-space: nowrap;
}

/* ── 메인 레이아웃 ── */
#main {
  display: flex;
  height: 100vh;
  padding-top: 60px;
}

/* ── 왼쪽 패널 ── */
#left-panel {
  width: 380px; min-width: 300px;
  background: var(--white);
  border-right: 1px solid var(--sand);
  flex-shrink: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── 왼쪽 패널 탭 ── */
#panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--sand);
  background: var(--white);
  flex-shrink: 0;
}
.panel-tab {
  flex: 1; padding: 14px 0;
  font-family: inherit; font-size: 13px; font-weight: 500;
  border: none; background: none; cursor: pointer;
  color: var(--ink3); transition: all .18s;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.panel-tab:hover { color: var(--ink2); background: var(--stone); }
.panel-tab.active {
  color: var(--accent); border-bottom-color: var(--accent);
  background: var(--white); font-weight: 600;
}
.panel-page { display: none; flex-direction: column; flex: 1; overflow-y: auto; }
.panel-page.active { display: flex; }
.panel-page::-webkit-scrollbar { width: 4px; }
.panel-page::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }

/* ── 여행 기본 정보 ── */
#trip-info {
  padding: 20px;
  border-bottom: 1px solid var(--stone);
}
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--ink3);
  margin-bottom: 14px;
}
.info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.info-field { display: flex; flex-direction: column; gap: 5px; }
.info-field.full { grid-column: 1 / -1; }
.info-field label {
  font-size: 11px; color: var(--ink3); font-weight: 500;
}
.info-field input, .info-field select {
  border: 1.5px solid var(--sand);
  border-radius: 8px;
  padding: 8px 10px;
  font-family: inherit; font-size: 13px; color: var(--ink);
  background: var(--cream);
  outline: none; transition: border-color .18s;
}
.info-field input:focus, .info-field select:focus {
  border-color: var(--accent);
}
.info-field input[readonly] {
  background: var(--stone); color: var(--ink3); cursor: default;
}

/* 날짜 배지 - 클릭 가능 버튼 스타일 */
#duration-badge {
  grid-column: 1 / -1;
  background: linear-gradient(135deg, var(--accent) 0%, #f0954a 100%);
  color: #fff; border-radius: 10px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 15px;
  cursor: pointer; border: none; width: 100%;
  font-family: inherit; text-align: left;
  transition: opacity .16s, transform .12s;
}
#duration-badge:hover { opacity: .92; transform: translateY(-1px); }
#duration-badge:active { transform: scale(.98); }
#duration-badge .icon { font-size: 20px; flex-shrink: 0; }
#duration-badge .sub  { font-size: 11px; font-weight: 400; opacity: .85; }
#duration-badge .edit-hint {
  margin-left: auto; font-size: 11px; opacity: .7;
  border: 1px solid rgba(255,255,255,0.5); border-radius: 6px;
  padding: 2px 7px; flex-shrink: 0;
}

/* 여행 설정 팝업 */
#trip-setup-overlay .popup { width: 460px; }
.setup-steps {
  display: flex; gap: 6px; margin-bottom: 22px;
  align-items: center;
}
.setup-step-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--sand); background: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--ink3);
  flex-shrink: 0; transition: all .2s;
}
.setup-step-dot.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.setup-step-dot.done   { border-color: var(--green);  background: var(--green);  color: #fff; }
.setup-step-line {
  flex: 1; height: 2px; background: var(--sand); border-radius: 2px;
  transition: background .2s;
}
.setup-step-line.done { background: var(--green); }
.setup-page { display: none; flex-direction: column; gap: 14px; }
.setup-page.active { display: flex; }
.setup-page-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700; color: var(--ink);
  margin-bottom: 2px;
}
.setup-page-sub { font-size: 13px; color: var(--ink3); margin-top: -10px; }
.setup-nav { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
.setup-nav button {
  padding: 9px 22px; border-radius: 9px; border: none;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .16s;
}
.btn-next   { background: var(--accent); color: #fff; }
.btn-next:hover   { background: #c96a2e; }
.btn-back   { background: var(--stone); color: var(--ink2); }
.btn-back:hover   { background: var(--sand); }
.btn-finish { background: var(--ink); color: #fff; }
.btn-finish:hover { background: #333; }

/* 항공 정보 */
#flight-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--stone);
}
.flight-card {
  background: var(--stone);
  border-radius: var(--r2);
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.flight-row {
  display: flex; align-items: center; gap: 8px;
}
.flight-row .lbl {
  font-size: 11px; color: var(--ink3); font-weight: 500; width: 52px; flex-shrink: 0;
}
.flight-row input {
  flex: 1; border: 1.5px solid var(--sand); border-radius: 7px;
  padding: 7px 10px; font-family: inherit; font-size: 13px;
  background: var(--white); outline: none; transition: border-color .18s;
}
.flight-row input:focus { border-color: var(--accent2); }
.airline-logo {
  width: 30px; height: 30px; border-radius: 6px;
  background: var(--accent2); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}

/* 일정 탭 */
#schedule-section { padding: 16px 20px; flex: 1; }
.day-tabs {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
}
.day-tab {
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--sand); background: var(--white);
  cursor: pointer; transition: all .16s; color: var(--ink3);
}
.day-tab.active {
  background: var(--ink); color: var(--white); border-color: var(--ink);
}
.day-tab:hover:not(.active) { background: var(--stone); }

/* 일정 아이템 */
.schedule-list { display: flex; flex-direction: column; gap: 8px; }
.schedule-item {
  background: var(--stone); border-radius: var(--r2);
  padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 10px;
  border-left: 3px solid transparent;
  transition: border-color .16s, box-shadow .16s;
  cursor: pointer;
  position: relative;
}
.schedule-item:hover { box-shadow: var(--shadow2); border-left-color: var(--accent); }
.schedule-item.type-food   { border-left-color: var(--accent); }
.schedule-item.type-sight  { border-left-color: var(--accent2); }
.schedule-item.type-hotel  { border-left-color: var(--green); }
.schedule-item.type-move   { border-left-color: var(--ink3); }
.item-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.type-food  .item-icon { background: #FEF0E6; }
.type-sight .item-icon { background: #E6F1FE; }
.type-hotel .item-icon { background: #E6F7EF; }
.type-move  .item-icon { background: var(--sand); }
.item-body  { flex: 1; min-width: 0; }
.item-time  { font-size: 11px; color: var(--ink3); }
.item-name  { font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-desc  { font-size: 12px; color: var(--ink3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* 일정 아이템 액션 버튼들 */
.item-actions {
  display: flex; flex-direction: column; gap: 4px;
  opacity: 0; transition: opacity .14s; flex-shrink: 0;
}
.schedule-item:hover .item-actions { opacity: 1; }
.item-act-btn {
  border: none; cursor: pointer; border-radius: 5px;
  font-size: 11px; font-weight: 500; padding: 3px 7px;
  font-family: inherit; transition: all .13s;
}
.item-edit { background: var(--sand); color: var(--ink2); }
.item-edit:hover { background: var(--accent2); color: #fff; }
.item-del  { background: none; color: var(--ink3); font-size: 13px; padding: 3px 5px; }
.item-del:hover  { background: var(--red); color: #fff; }
.item-loc  { background: var(--stone); color: var(--ink3); }
.item-loc:hover  { background: var(--green); color: #fff; }

/* 일정 위치 핀 배지 */
.item-has-loc {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; color: var(--green); font-weight: 500;
  margin-top: 3px;
}

/* ── 이동 카드 ── */
.transit-card {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px 7px 20px;
  position: relative;
}
.transit-line {
  position: absolute; left: 28px; top: 0; bottom: 0;
  width: 2px; background: var(--sand);
}
.transit-body {
  display: flex; align-items: center; gap: 8px;
  background: var(--white); border: 1.5px solid var(--sand);
  border-radius: 20px; padding: 5px 12px 5px 8px;
  font-size: 12px; color: var(--ink3); flex: 1;
  min-width: 0; position: relative; z-index: 1;
  cursor: default;
}
.transit-body.loading { opacity: .6; }
.transit-mode-btn {
  background: none; border: none; cursor: pointer;
  font-size: 14px; padding: 0; flex-shrink: 0;
  transition: transform .15s;
}
.transit-mode-btn:hover { transform: scale(1.2); }
.transit-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.transit-dist { font-weight: 600; color: var(--ink2); }
.transit-time { color: var(--ink3); }
.transit-sep  { color: var(--sand); }
.transit-no-loc { color: var(--sand); font-style: italic; font-size: 11px; }

/* 이동수단 선택 팝업 */
.mode-picker {
  position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: var(--white); border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  padding: 8px; display: flex; gap: 4px;
  z-index: 100; white-space: nowrap;
}
.mode-opt {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  border: 1.5px solid transparent; transition: all .13s;
  font-size: 10px; color: var(--ink3);
}
.mode-opt:hover { background: var(--stone); }
.mode-opt.active { border-color: var(--accent2); background: #EBF3FE; color: var(--accent2); font-weight: 600; }
.mode-opt .mode-ico { font-size: 18px; }

/* 지도 위 일정 팝오버 */
#sch-map-card {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--white); border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.14);
  padding: 10px 14px; z-index: 10;
  display: none; align-items: center; gap: 10px;
  min-width: 180px; max-width: 260px;
  border-left: 3px solid var(--accent);
}
#sch-map-card.show { display: flex; }
#sch-map-card .smc-icon { font-size: 18px; flex-shrink: 0; }
#sch-map-card .smc-body { flex: 1; min-width: 0; }
#sch-map-card .smc-time { font-size: 10px; color: var(--ink3); }
#sch-map-card .smc-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#sch-map-card .smc-close { background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 16px; flex-shrink: 0; padding: 0 2px; }
#sch-map-card .smc-close:hover { color: var(--ink); }
#add-schedule-btn {
  width: 100%; margin-top: 10px;
  padding: 10px; border-radius: var(--r2);
  border: 1.5px dashed var(--sand); background: none;
  font-family: inherit; font-size: 13px; color: var(--ink3);
  cursor: pointer; transition: all .16s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
#add-schedule-btn:hover { border-color: var(--accent); color: var(--accent); background: #FEF5EE; }

/* 맛집 핀 섹션 */
#places-section {
  padding: 16px 20px;
  border-top: 1px solid var(--stone);
}
.place-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
}
.place-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--stone); border-radius: 20px;
  padding: 5px 10px 5px 8px;
  font-size: 12px; color: var(--ink2); cursor: pointer;
  border: 1.5px solid transparent; transition: all .14s;
}
.place-chip:hover  { border-color: var(--accent); color: var(--accent); }
.place-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.place-chip .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.place-chip.active .dot { background: #fff; }
#add-place-btn {
  background: none; border: 1.5px dashed var(--sand);
  border-radius: 20px; padding: 5px 12px;
  font-family: inherit; font-size: 12px; color: var(--ink3);
  cursor: pointer; transition: all .14s;
}
#add-place-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── 지도 ── */
#map-wrapper {
  flex: 1;
  position: relative;
  background: var(--stone);
}
#map { width: 100%; height: 100%; }
#map-fab {
  position: absolute; bottom: 24px; right: 24px;
  background: var(--white); border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 6px;
  display: flex; flex-direction: column; gap: 4px;
  z-index: 10;
}
.fab-btn {
  width: 40px; height: 40px; border-radius: 8px;
  border: none; cursor: pointer; background: none;
  font-size: 16px; transition: background .14s;
  display: flex; align-items: center; justify-content: center;
}
.fab-btn:hover { background: var(--stone); }
.fab-btn.active { background: var(--accent); }

/* ── 팝업 공통 ── */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.popup {
  background: var(--white); border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  padding: 28px;
  width: 420px; max-width: calc(100vw - 32px);
  transform: translateY(16px);
  transition: transform .2s;
  max-height: 90vh; overflow-y: auto;
}
.overlay.show .popup { transform: none; }
.popup-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700;
  margin-bottom: 20px; color: var(--ink);
}
.popup-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.popup-field label { font-size: 12px; color: var(--ink3); font-weight: 500; }
.popup-field input, .popup-field select, .popup-field textarea {
  border: 1.5px solid var(--sand); border-radius: 8px;
  padding: 9px 12px; font-family: inherit; font-size: 13px;
  background: var(--cream); outline: none; transition: border-color .18s; color: var(--ink);
}
.popup-field input:focus, .popup-field select:focus, .popup-field textarea:focus { border-color: var(--accent); }
.popup-field textarea { resize: vertical; min-height: 70px; }
.popup-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.popup-actions button {
  padding: 9px 20px; border-radius: 9px;
  border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
  transition: all .16s;
}
.btn-cancel { background: var(--stone); color: var(--ink2); }
.btn-cancel:hover { background: var(--sand); }
.btn-save   { background: var(--accent); color: #fff; }
.btn-save:hover { background: #c96a2e; }
.type-selector {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 6px;
}
.type-opt {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 6px; border-radius: 10px;
  border: 1.5px solid var(--sand); cursor: pointer;
  font-size: 11px; color: var(--ink3); transition: all .14s;
  background: var(--cream);
}
.type-opt .ico { font-size: 20px; }
.type-opt.sel { border-color: var(--accent); background: #FEF5EE; color: var(--accent); font-weight: 600; }

/* 맛집 사진 팝업 */
#place-popup .popup { width: 340px; padding: 0; overflow: hidden; }
#place-popup-img {
  width: 100%; height: 200px; object-fit: cover; display: block;
  background: var(--stone);
}
#place-popup-body { padding: 20px; }
#place-popup-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; margin-bottom: 4px;
}
#place-popup-desc { font-size: 13px; color: var(--ink3); margin-bottom: 14px; }
#place-popup-close {
  position: absolute; top: 12px; right: 12px;
  background: rgba(0,0,0,0.4); border: none; border-radius: 50%;
  width: 30px; height: 30px; cursor: pointer; color: #fff;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
}

/* 저장 토스트 */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--ink); color: #fff;
  padding: 10px 20px; border-radius: 30px;
  font-size: 13px; z-index: 999;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* 경로 추가 버튼 */
#route-controls {
  position: absolute; top: 16px; left: 16px; z-index: 10;
  display: flex; flex-direction: column; gap: 6px;
}
.route-btn {
  background: var(--white); border: none;
  border-radius: 10px; box-shadow: var(--shadow2);
  padding: 8px 14px; font-family: inherit;
  font-size: 12px; font-weight: 500; cursor: pointer;
  color: var(--ink2); transition: all .14s;
  display: flex; align-items: center; gap: 6px;
}
.route-btn:hover { background: var(--accent); color: #fff; }
.route-btn.active { background: var(--accent2); color: #fff; }

/* ── 모바일 ── */
@media (max-width: 768px) {
  html, body { overflow: auto; }
  #main { flex-direction: column; height: auto; overflow: visible; }
  #left-panel {
    width: 100%; border-right: none;
    border-bottom: 1px solid var(--sand);
    overflow: hidden;
    min-height: 0;
  }
  .panel-page { overflow: visible; }
  #map-wrapper { height: 60vw; min-height: 300px; flex-shrink: 0; }
  #header h1  { font-size: 17px; }
  .popup { padding: 20px; }
}

@media (max-width: 480px) {
  #header { padding: 0 14px; gap: 8px; }
  #trip-info, #flight-section, #schedule-section, #places-section { padding: 14px; }
  .info-grid { grid-template-columns: 1fr; }
  #duration-badge { grid-column: 1; }
  .type-selector { grid-template-columns: repeat(2,1fr); }
}

/* 로딩 */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--cream);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px;
}
#loading .logo {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 700; color: var(--ink);
}
#loading .logo span { color: var(--accent); }
#loading .spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 3px solid var(--sand);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
/* 핀 찍기 모드 */
#pin-mode-banner {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  z-index: 300;
  background: var(--ink); color: #fff;
  padding: 10px 22px; border-radius: 30px;
  font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.22);
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
  white-space: nowrap;
}
#pin-mode-banner.show { opacity: 1; pointer-events: all; }
#pin-mode-banner .cancel-pin {
  background: rgba(255,255,255,0.2); border: none; border-radius: 20px;
  color: #fff; font-size: 12px; padding: 4px 10px; cursor: pointer;
  font-family: inherit; transition: background .14s;
}
#pin-mode-banner .cancel-pin:hover { background: rgba(255,255,255,0.35); }
#map-wrapper.pin-mode,
#map-wrapper.pin-mode #map { cursor: crosshair !important; }

/* 핀 위치 선택 버튼 */
#pl-pick-btn, #sch-pick-btn {
  width: 100%; padding: 10px 14px; border-radius: 8px;
  border: 1.5px dashed var(--sand); background: var(--cream);
  font-family: inherit; font-size: 13px; color: var(--ink3);
  cursor: pointer; transition: all .16s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
#pl-pick-btn:hover, #sch-pick-btn:hover { border-color: var(--accent); color: var(--accent); background: #FEF5EE; }
#pl-pick-btn.picked, #sch-pick-btn.picked { border-color: var(--green); color: var(--green); background: #EBF7F2; border-style: solid; }
/* ── 커스텀 시간 선택기 ── */
.time-picker {
  display: flex; align-items: center; gap: 6px; flex: 1;
}
.tp-display {
  flex: 1; border: 1.5px solid var(--sand); border-radius: 7px;
  padding: 7px 10px; font-family: inherit; font-size: 13px;
  background: var(--white); color: var(--ink); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: border-color .18s; user-select: none;
}
.tp-display:hover { border-color: var(--accent2); }
.tp-display .tp-val { font-weight: 500; }
.tp-display .tp-arrow { color: var(--ink3); font-size: 10px; }

/* 시간 팝업 */
.tp-popup {
  position: fixed; z-index: 500;
  background: var(--white); border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.16);
  padding: 16px; display: none;
  flex-direction: column; gap: 12px;
  min-width: 220px;
}
.tp-popup.open { display: flex; }
.tp-popup-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--ink3); margin-bottom: 2px;
}
.tp-section { display: flex; flex-direction: column; gap: 6px; }
.tp-section-label { font-size: 11px; color: var(--ink3); }
.tp-grid {
  display: grid; gap: 4px;
}
.tp-grid.hour-grid { grid-template-columns: repeat(6, 1fr); }
.tp-grid.min-grid  { grid-template-columns: repeat(6, 1fr); }
.tp-grid.ampm-grid { grid-template-columns: repeat(2, 1fr); }
.tp-btn {
  padding: 6px 2px; border-radius: 6px; border: 1.5px solid var(--sand);
  background: var(--cream); font-family: inherit; font-size: 12px;
  font-weight: 500; color: var(--ink2); cursor: pointer;
  transition: all .12s; text-align: center;
}
.tp-btn:hover { border-color: var(--accent2); color: var(--accent2); background: #EBF3FE; }
.tp-btn.sel { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.tp-btn.ampm { font-size: 13px; padding: 8px; }
.tp-close-row { display: flex; justify-content: flex-end; margin-top: 2px; }
.tp-close-btn {
  padding: 6px 16px; border-radius: 8px; border: none;
  background: var(--ink); color: #fff; font-family: inherit;
  font-size: 12px; font-weight: 500; cursor: pointer;
}
.tp-close-btn:hover { background: #333; }
/* ── 챙겨야할 것 탭 ── */
#checklist-section { padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }

/* 체크박스 리스트 */
.check-group { display: flex; flex-direction: column; gap: 6px; }
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  background: var(--stone); cursor: pointer;
  transition: background .14s; user-select: none;
  border: 1.5px solid transparent;
}
.check-item:hover { background: var(--sand); }
.check-item.checked {
  background: #EBF7EF; border-color: var(--green);
}
.check-item input[type="checkbox"] { display: none; }
.check-box {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--sand); background: var(--white);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .14s; font-size: 12px;
}
.check-item.checked .check-box {
  background: var(--green); border-color: var(--green); color: #fff;
}
.check-label { font-size: 13px; font-weight: 500; color: var(--ink2); flex: 1; }
.check-item.checked .check-label { color: var(--ink3); text-decoration: line-through; }
.check-emoji { font-size: 16px; flex-shrink: 0; }

/* 바우처 그리드 */
.voucher-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.voucher-card {
  border-radius: 12px; overflow: hidden;
  border: 1.5px solid var(--sand);
  background: var(--stone); cursor: pointer;
  transition: all .16s; position: relative;
  aspect-ratio: 3/2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
}
.voucher-card:hover { border-color: var(--accent2); background: #EEF5FF; }
.voucher-card.has-image { border-color: var(--accent2); background: var(--white); }
.voucher-card .vc-empty-icon { font-size: 22px; opacity: .4; }
.voucher-card .vc-label {
  font-size: 11px; font-weight: 600; color: var(--ink3);
  text-align: center; padding: 0 8px; line-height: 1.3;
}
.voucher-card.has-image .vc-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.55));
  color: #fff; padding: 14px 8px 6px; font-size: 11px;
}
.voucher-card img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  position: absolute; inset: 0;
}
.voucher-del {
  position: absolute; top: 5px; right: 5px;
  background: rgba(0,0,0,0.45); border: none; border-radius: 50%;
  width: 22px; height: 22px; color: #fff; cursor: pointer;
  font-size: 11px; display: none; align-items: center; justify-content: center;
}
.voucher-card.has-image:hover .voucher-del { display: flex; }
.voucher-card .vc-add { font-size: 20px; color: var(--ink3); opacity: .5; }

/* 바우처 뷰어 팝업 — PDF/이미지 통합 */
#voucher-viewer .popup {
  padding: 0; overflow: hidden;
  width: min(560px, calc(100vw - 32px));
  max-height: 92vh;
  display: flex; flex-direction: column;
}
#vv-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-bottom: 1px solid var(--sand);
  flex-shrink: 0;
}
#vv-label {
  flex: 1; font-size: 14px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#vv-page-info { font-size: 12px; color: var(--ink3); flex-shrink: 0; }
#vv-close {
  background: var(--stone); border: none; border-radius: 50%;
  width: 28px; height: 28px; color: var(--ink2); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#vv-close:hover { background: var(--sand); }
#vv-body {
  flex: 1; overflow-y: auto; background: #2a2a2a;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 12px;
  min-height: 0;
}
#vv-body::-webkit-scrollbar { width: 6px; }
#vv-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
/* 이미지 뷰어 */
#vv-img {
  max-width: 100%; border-radius: 4px;
  display: block; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
/* PDF 캔버스들 */
.vv-pdf-page {
  max-width: 100%; border-radius: 4px;
  display: block; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
#vv-loading {
  color: rgba(255,255,255,0.6); font-size: 13px; padding: 40px;
  display: flex; align-items: center; gap: 10px;
}
#vv-loading .mini-spin {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: rgba(255,255,255,0.7);
  animation: spin .7s linear infinite;
}
/* 썸네일 PDF 배지 */
.vc-pdf-badge {
  position: absolute; top: 6px; left: 6px;
  background: rgba(58,143,224,0.9); color: #fff;
  font-size: 10px; font-weight: 700; border-radius: 4px;
  padding: 2px 6px; letter-spacing: .5px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loading">
  <div class="logo">travel<span>.</span></div>
  <div class="spinner"></div>
</div>

<!-- 헤더 -->
<div id="header">
  <h1 id="trip-title-display">여행 계획판 <span>✈</span></h1>
  <span id="trip-id-badge">ID 로드 중…</span>
  <button class="header-btn ghost" id="share-btn">🔗 공유</button>
  <button class="header-btn primary" id="save-btn">저장</button>
</div>

<!-- 메인 -->
<div id="main">

  <!-- 왼쪽 패널 -->
  <div id="left-panel">

    <!-- 패널 탭 -->
    <div id="panel-tabs">
      <button class="panel-tab active" onclick="switchPanelTab(0)">
        ✈️ 여행 정보
      </button>
      <button class="panel-tab" onclick="switchPanelTab(1)">
        📅 일별 일정
      </button>
      <button class="panel-tab" onclick="switchPanelTab(2)">
        🎒 챙겨야할 것
      </button>
    </div>

    <!-- 탭 1: 여행 정보 + 항공편 -->
    <div class="panel-page active" id="panel-page-0">

      <!-- 여행 기본 정보 -->
      <div id="trip-info">
        <div class="section-label">여행 기본 정보</div>
        <div class="info-grid">
          <button id="duration-badge" onclick="openTripSetup()">
            <span class="icon">🏖️</span>
            <div>
              <div id="duration-text">날짜를 선택하세요</div>
              <div class="sub" id="duration-nights">—</div>
            </div>
            <span class="edit-hint">✏️ 편집</span>
          </button>
          <!-- 숨김 필드 (데이터용) -->
          <input type="hidden" id="trip-title" />
          <input type="hidden" id="trip-start" />
          <input type="hidden" id="trip-end" />
          <input type="hidden" id="trip-note" />
        </div>
        <!-- 여행 정보 요약 표시 -->
        <div id="trip-summary" style="margin-top:12px;display:none;">
          <div style="background:var(--stone);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;">
            <div id="summary-title" style="font-size:14px;font-weight:600;color:var(--ink);"></div>
            <div id="summary-note"  style="font-size:12px;color:var(--ink3);"></div>
          </div>
        </div>
      </div>

      <!-- 항공편 -->
      <div id="flight-section">
        <div class="section-label">항공편</div>
        <div class="flight-card">
          <div class="flight-row">
            <span class="lbl">항공사</span>
            <div class="airline-logo" id="airline-logo">✈</div>
            <input type="text" id="flight-airline" placeholder="예: 대한항공 KE701" oninput="updateAirlineLogo()" />
          </div>
          <div class="flight-row">
            <span class="lbl">출발</span>
            <div class="time-picker" id="tp-flight-depart"></div>
            <input type="text" id="flight-from" placeholder="ICN" style="width:70px;flex:none;" />
          </div>
          <div class="flight-row">
            <span class="lbl">도착</span>
            <div class="time-picker" id="tp-flight-arrive"></div>
            <input type="text" id="flight-to" placeholder="NRT" style="width:70px;flex:none;" />
          </div>
          <!-- 귀국편 -->
          <div style="border-top:1px solid var(--sand);margin:4px 0;padding-top:8px;">
            <div style="font-size:11px;color:var(--ink3);margin-bottom:6px;">귀국편</div>
          </div>
          <div class="flight-row">
            <span class="lbl">항공사</span>
            <input type="text" id="return-airline" placeholder="예: 아시아나 OZ102" />
          </div>
          <div class="flight-row">
            <span class="lbl">출발</span>
            <div class="time-picker" id="tp-return-depart"></div>
            <input type="text" id="return-from" placeholder="NRT" style="width:70px;flex:none;" />
          </div>
          <div class="flight-row">
            <span class="lbl">도착</span>
            <div class="time-picker" id="tp-return-arrive"></div>
            <input type="text" id="return-to" placeholder="ICN" style="width:70px;flex:none;" />
          </div>
        </div>
      </div>

      <!-- 맛집 핀 -->
      <div id="places-section">
        <div class="section-label">📍 맛집 &amp; 장소</div>
        <div class="place-chips" id="place-chips"></div>
        <button id="add-place-btn" onclick="openPlacePopup()">＋ 장소 추가</button>
      </div>

    </div><!-- /panel-page-0 -->

    <!-- 탭 2: 일별 일정 -->
    <div class="panel-page" id="panel-page-1">
      <div id="schedule-section" style="flex:1;padding:16px 20px;">
        <div class="section-label">일별 일정</div>
        <div class="day-tabs" id="day-tabs"></div>
        <div class="schedule-list" id="schedule-list"></div>
        <button id="add-schedule-btn" onclick="openSchedulePopup()">
          <span>＋</span> 일정 추가
        </button>
      </div>
    </div><!-- /panel-page-1 -->

    <!-- 탭 3: 챙겨야할 것 -->
    <div class="panel-page" id="panel-page-2">
      <div id="checklist-section">

        <!-- 여행 준비물 -->
        <div>
          <div class="section-label">여행 준비물</div>
          <div class="check-group" id="check-group"></div>
        </div>

        <!-- 바우처 / 티켓 -->
        <div>
          <div class="section-label">바우처 / 티켓</div>
          <div class="check-group" id="voucher-group"></div>
        </div>

      </div>
    </div><!-- /panel-page-2 -->

  </div><!-- /left-panel -->

  <!-- 지도 -->
  <div id="map-wrapper">
    <div id="map"></div>
    <!-- 일정 카드 클릭 시 지도 위 표시 -->
    <div id="sch-map-card">
      <span class="smc-icon" id="smc-icon">📌</span>
      <div class="smc-body">
        <div class="smc-time" id="smc-time"></div>
        <div class="smc-name" id="smc-name"></div>
      </div>
      <button class="smc-close" onclick="hideSchMapCard()">✕</button>
    </div>
    <div id="route-controls">
      <button class="route-btn" id="btn-route-mode" onclick="toggleRouteMode()">🛣️ 경로 추가 모드</button>
      <button class="route-btn" id="btn-clear-route" onclick="clearRoute()">🗑️ 경로 삭제</button>
    </div>
    <div id="map-fab">
      <button class="fab-btn" onclick="mapZoom(1)" title="확대">＋</button>
      <button class="fab-btn" onclick="mapZoom(-1)" title="축소">－</button>
      <button class="fab-btn" onclick="mapFitRoute()" title="경로 맞춤">⊞</button>
    </div>
  </div>

</div><!-- /main -->

<!-- 일정 추가 팝업 -->
<div class="overlay" id="schedule-overlay" onclick="closeIfBg(event,'schedule-overlay')">
  <div class="popup">
    <div class="popup-title">일정 추가</div>
    <div class="popup-field">
      <label>유형</label>
      <div class="type-selector">
        <div class="type-opt sel" data-type="food"  onclick="selectType(this,'food')">
          <span class="ico">🍜</span>맛집
        </div>
        <div class="type-opt" data-type="sight" onclick="selectType(this,'sight')">
          <span class="ico">🏛️</span>관광
        </div>
        <div class="type-opt" data-type="hotel" onclick="selectType(this,'hotel')">
          <span class="ico">🏨</span>숙소
        </div>
        <div class="type-opt" data-type="move"  onclick="selectType(this,'move')">
          <span class="ico">🚆</span>이동
        </div>
      </div>
    </div>
    <div class="popup-field">
      <label>이름</label>
      <input type="text" id="sch-name" placeholder="장소 또는 일정 이름" />
    </div>
    <div class="popup-field">
      <label>시간</label>
      <div class="time-picker" id="tp-sch-time"></div>
    </div>
    <div class="popup-field">
      <label>메모</label>
      <textarea id="sch-desc" placeholder="간단한 메모를 입력하세요"></textarea>
    </div>
    <div class="popup-field">

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ── 상태 ──────────────────────────────────────────────────────
let TRIP_ID = null;
let map = null, markers = [], routePolyline = null, routePoints = [];
let routeMode = false;
let scheduleData  = {};
let placesData    = [];
let checklistData = {};   // { "passport": true, "license": false, ... }
let voucherData   = {};   // { "flight-out": "base64...", ... }
let currentDay    = 1;
let totalDays     = 1;
let selectedType  = 'food';
let pendingLatLng = null;
let currentPlaceForMaps = null;

// ── URL 파라미터에서 trip ID ─────────────────────────────────
function getTripIdFromUrl() {
  const p = new URLSearchParams(location.search);
  return p.get('trip');
}
function setTripIdInUrl(id) {
  const url = new URL(location.href);
  url.searchParams.set('trip', id);
  history.replaceState({}, '', url);
}
function generateId() {
  return Math.random().toString(36).slice(2,9).toUpperCase();
}

// ── 초기화 ────────────────────────────────────────────────────
async function init() {
  TRIP_ID = getTripIdFromUrl() || generateId();
  setTripIdInUrl(TRIP_ID);
  document.getElementById('trip-id-badge').textContent = '🔑 ' + TRIP_ID;

  // UI 초기화
  initTimePickers();
  initDateMinLink();
  renderChecklist();
  renderVouchers();

  // Maps 초기화 (별도 async 로드)
  if (window.mapsReady) setupMap();
  else document.addEventListener('maps-ready', setupMap);

  // Firebase는 이미 준비된 상태로 호출됨
  try {
    await loadFromFirebase();
  } catch(e) {
    console.error('Firebase 로드 실패:', e);
  }
  document.getElementById('loading').style.display = 'none';
}

// ── Firebase 로드 ─────────────────────────────────────────────
async function loadFromFirebase() {
  const data = await window.fbGetTrip(TRIP_ID);
  if (data) {
    applyTripData(data);
    restoreUIState();
  }

  window.fbWatchPlaces(TRIP_ID, (places) => {
    placesData = places;
    renderPlaceChips();
    renderMapMarkers();
  });

  // 자동저장 감시 (항공편 필드들)
  const watchedFields = [
    'flight-airline','flight-depart','flight-from','flight-arrive','flight-to',
    'return-airline','return-depart','return-from','return-arrive','return-to'];
  watchedFields.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('change', () => { autoSave(); });
    }
  });
}

function applyTripData(data) {
  const setVal = (id, v) => { const e = document.getElementById(id); if (e && v !== undefined) e.value = v; };
  setVal('trip-title',    data.title);
  setVal('trip-start',    data.startDate);
  setVal('trip-end',      data.endDate);
  setVal('trip-note',     data.note);
  setVal('flight-airline',data.flightAirline);
  setVal('flight-from',   data.flightFrom);
  setVal('flight-to',     data.flightTo);
  setVal('return-airline',data.returnAirline);
  setVal('return-from',   data.returnFrom);
  setVal('return-to',     data.returnTo);
  // 커스텀 시간 선택기 복원
  timeToTp('fdep', data.flightDepart);
  timeToTp('farr', data.flightArrive);
  timeToTp('rdep', data.returnDepart);
  timeToTp('rarr', data.returnArrive);
  if (data.schedule)     scheduleData  = data.schedule;
  if (data.transitModes) transitModes  = data.transitModes;
  if (data.checklist) { checklistData = data.checklist; renderChecklist(); }
  if (data.vouchers)  { voucherData   = data.vouchers;  renderVouchers(); }
  if (data.routePoints) {
    routePoints = data.routePoints;
    if (map) drawRoute();
  }
  updateDuration();
  updateTripSummary();
  // 초기 로드: 모든 일정 핀을 한눈에 보이게 fitBounds
  // (저장된 mapCenter는 사용자가 직접 이동한 거라 덮어쓰지 않음 — 핀 기준 우선)
  fitSchedulePins(data.title);
  updateAirlineLogo();
}

// ── 챙겨야할 것 ───────────────────────────────────────────────
const CHECKLIST_ITEMS = [
  { id: 'passport',    label: '여권',           emoji: '🛂' },
  { id: 'id-card',     label: '신분증',          emoji: '🪪' },
  { id: 'intl-license',label: '국제면허증',       emoji: '🚗' },
  { id: 'toiletry',    label: '세면도구',         emoji: '🧴' },
  { id: 'adapter',     label: '변압기 / 어댑터',  emoji: '🔌' },
  { id: 'visit-japan', label: 'Visit Japan Web',  emoji: '🇯🇵' },
];


function renderChecklist() {
  const group = document.getElementById('check-group');
  if (!group) return;
  group.innerHTML = '';
  CHECKLIST_ITEMS.forEach(item => {
    const checked = !!checklistData[item.id];
    const div = document.createElement('label');
    div.className = 'check-item' + (checked ? ' checked' : '');
    div.innerHTML = `
      <span class="check-emoji">${item.emoji}</span>
      <span class="check-label">${item.label}</span>
      <div class="check-box">${checked ? '✓' : ''}</div>`;
    div.onclick = () => toggleCheck(item.id);
    group.appendChild(div);
  });
}

function toggleCheck(id) {
  checklistData[id] = !checklistData[id];
  renderChecklist();
  autoSave();
}

// ── 바우처 체크리스트 ─────────────────────────────────────────
const VOUCHER_ITEMS = [
  { id: 'eticket-out', label: '비행기 출국 E-Ticket', emoji: '✈️' },
  { id: 'eticket-in',  label: '비행기 귀국 E-Ticket', emoji: '🛬' },
  { id: 'rentcar',     label: '렌트카 바우처',          emoji: '🚗' },
  { id: 'hotel1',      label: '호텔 바우처 1',          emoji: '🏨' },
  { id: 'hotel2',      label: '호텔 바우처 2',          emoji: '🏩' },
];

function renderVouchers() {
  const group = document.getElementById('voucher-group');
  if (!group) return;
  group.innerHTML = '';
  VOUCHER_ITEMS.forEach(item => {
    const checked = !!voucherData[item.id];
    const div = document.createElement('label');
    div.className = 'check-item' + (checked ? ' checked' : '');
    div.innerHTML = `
      <span class="check-emoji">${item.emoji}</span>
      <span class="check-label">${item.label}</span>
      <div class="check-box">${checked ? '✓' : ''}</div>`;
    div.onclick = () => toggleVoucher(item.id);
    group.appendChild(div);
  });
}

function toggleVoucher(id) {
  voucherData[id] = !voucherData[id];
  renderVouchers();
  autoSave();
}

// ── 저장 ─────────────────────────────────────────────────────
async function saveAll() {
  const payload = {
    title:         document.getElementById('trip-title').value,
    startDate:     document.getElementById('trip-start').value,
    endDate:       document.getElementById('trip-end').value,
    note:          document.getElementById('trip-note').value,
    flightAirline: document.getElementById('flight-airline').value,
    flightDepart:  tpToTime('fdep'),
    flightFrom:    document.getElementById('flight-from').value,
    flightArrive:  tpToTime('farr'),
    flightTo:      document.getElementById('flight-to').value,
    returnAirline: document.getElementById('return-airline').value,
    returnDepart:  tpToTime('rdep'),
    returnFrom:    document.getElementById('return-from').value,
    returnArrive:  tpToTime('rarr'),
    returnTo:      document.getElementById('return-to').value,
    schedule:      scheduleData,
    transitModes,
    routePoints,
    checklist:     checklistData,
    vouchers:      voucherData,
    mapCenter:     map ? { lat: map.getCenter().lat(), lng: map.getCenter().lng() } : null,
    mapZoom:       map ? map.getZoom() : 12,
    updatedAt:     new Date().toISOString(),
  };
  await window.fbSaveTrip(TRIP_ID, payload);
  showToast('저장되었습니다 ✓');
  updateTripSummary();
}

let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAll, 1500);
}

document.getElementById('save-btn').onclick = saveAll;

// ── 공유 ─────────────────────────────────────────────────────
document.getElementById('share-btn').onclick = () => {
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => showToast('링크가 복사되었습니다! 🔗'));
};

// ── 날짜/기간 ─────────────────────────────────────────────────
function updateDuration() {
  const s = document.getElementById('trip-start').value;
  const e = document.getElementById('trip-end').value;
  if (!s || !e) return;
  const sd = new Date(s), ed = new Date(e);
  const diff = Math.round((ed - sd) / 86400000);
  if (diff < 0) return;
  totalDays = diff + 1;
  const nights = diff;
  document.getElementById('duration-text').textContent =
    sd.toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) + ' ~ ' +
    ed.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
  document.getElementById('duration-nights').textContent =
    nights + '박 ' + totalDays + '일';
  renderDayTabs();
}

// ── 일별 탭 ───────────────────────────────────────────────────
function renderDayTabs() {
  const c = document.getElementById('day-tabs');
  c.innerHTML = '';
  for (let i = 1; i <= totalDays; i++) {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === currentDay ? ' active' : '');
    btn.textContent = 'Day ' + i;
    btn.onclick = () => { currentDay = i; sessionStorage.setItem('currentDay', i); renderDayTabs(); renderScheduleList(); };
    c.appendChild(btn);
  }
  renderScheduleList();
}

// ── 일정 렌더링 ───────────────────────────────────────────────
// ── 이동 수단 설정 저장 { "day_fromIdx": 'driving'|'transit'|'walking'|'bicycling' }
let transitModes = {};
function transitKey(day, idx) { return day + '_' + idx; }

const MODE_LIST = [
  { id: 'driving',   icon: '🚗', label: '렌트카' },
  { id: 'transit',   icon: '🚆', label: '대중교통' },
  { id: 'walking',   icon: '🚶', label: '도보' },
  { id: 'bicycling', icon: '🚲', label: '자전거' },
];

function renderScheduleList() {
  const list = document.getElementById('schedule-list');
  const items = scheduleData[currentDay] || [];
  list.innerHTML = '';
  const typeIcon = { food:'🍜', sight:'🏛️', hotel:'🏨', move:'🚆' };

  items.forEach((item, idx) => {
    // ── 일정 카드
    const div = document.createElement('div');
    div.className = 'schedule-item type-' + item.type;
    const hasLoc = item.lat && item.lng;
    div.innerHTML = `
      <div class="item-icon">${typeIcon[item.type]||'📌'}</div>
      <div class="item-body" onclick="onScheduleItemClick(${idx})">
        <div class="item-time">${item.time ? fmtTime(item.time) : ''}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc || ''}</div>
        ${hasLoc ? '<div class="item-has-loc">📍 위치 등록됨</div>' : ''}
      </div>
      <div class="item-actions">
        <button class="item-act-btn item-edit" onclick="openEditSchedule(${idx})">편집</button>
        <button class="item-act-btn item-del"  onclick="deleteScheduleItem(${idx})">✕</button>
      </div>`;
    list.appendChild(div);

    // ── 이동 카드 (마지막 카드 뒤엔 없음)
    if (idx < items.length - 1) {
      const next = items[idx + 1];
      const tc = buildTransitCard(item, next, idx);
      list.appendChild(tc);
      // DOM에 붙은 후에 Directions 호출
      if (item.lat && item.lng && next.lat && next.lng) {
        const mode = transitModes[transitKey(currentDay, idx)] || 'driving';
        fetchDirections(item, next, mode, idx);
      }
    }
  });
}

function buildTransitCard(from, to, fromIdx) {
  const key  = transitKey(currentDay, fromIdx);
  const mode = transitModes[key] || 'driving';
  const modeInfo = MODE_LIST.find(m => m.id === mode);

  const wrap = document.createElement('div');
  wrap.className = 'transit-card';
  wrap.dataset.fromIdx = fromIdx;

  wrap.innerHTML = `
    <div class="transit-line"></div>
    <div class="transit-body" id="tc-body-${fromIdx}">
      <button class="transit-mode-btn" onclick="openModePicker(event,${fromIdx})" title="이동수단 선택">
        ${modeInfo.icon}
      </button>
      <div class="transit-info" id="tc-info-${fromIdx}">
        <span class="transit-no-loc">위치 핀을 찍으면 거리가 표시돼요</span>
      </div>
    </div>`;
  list_appendTransitCard(wrap);
  return wrap;
}

// Directions API 호출
function fetchDirections(from, to, mode, fromIdx) {
  if (!window.google || !window.google.maps) return;
  const infoEl = document.getElementById('tc-info-' + fromIdx);
  const bodyEl = document.getElementById('tc-body-' + fromIdx);
  if (!infoEl) return;
  infoEl.innerHTML = '<span class="transit-no-loc">계산 중…</span>';
  if (bodyEl) bodyEl.classList.add('loading');

  const modeInfo = MODE_LIST.find(m => m.id === mode);
  // eslint-disable-next-line no-undef
  const svc = new google.maps.DirectionsService();
  const req = {
    origin:      new google.maps.LatLng(from.lat, from.lng),
    destination: new google.maps.LatLng(to.lat, to.lng),
    travelMode:  google.maps.TravelMode[mode.toUpperCase()] || google.maps.TravelMode.DRIVING,
    provideRouteAlternatives: mode === 'transit',
  };
  if (mode === 'transit') {
    req.transitOptions = { departureTime: new Date() };
  }

  svc.route(req, (result, status) => {
    if (bodyEl) bodyEl.classList.remove('loading');
    if (status === google.maps.DirectionsStatus.OK) {
      let distTxt, durTxt;
      if (mode === 'transit' && result.routes.length > 1) {
        const avgSec = Math.round(
          result.routes.reduce((s,r) => s + r.legs[0].duration.value, 0) / result.routes.length
        );
        const avgMin = Math.round(avgSec / 60);
        distTxt = result.routes[0].legs[0].distance.text;
        durTxt  = avgMin >= 60
          ? `${Math.floor(avgMin/60)}시간 ${avgMin%60 > 0 ? avgMin%60+'분' : ''}`
          : `${avgMin}분`;
        durTxt += ` (${result.routes.length}개 루트 평균)`;
      } else {
        const leg = result.routes[0].legs[0];
        distTxt = leg.distance.text;
        durTxt  = leg.duration.text;
      }
      infoEl.innerHTML = `
        <span class="transit-dist">${distTxt}</span>
        <span class="transit-sep">·</span>
        <span class="transit-time">약 ${durTxt}</span>
        <span class="transit-sep">·</span>
        <span style="font-size:11px;color:var(--ink3)">${modeInfo.label}</span>`;
    } else {
      console.warn('Directions status:', status, mode, from, to);
      infoEl.innerHTML = `<span class="transit-no-loc">경로를 찾을 수 없어요</span>`;
    }
  });
}

// 이동수단 선택 팝업
let openModePickerEl = null;
function openModePicker(e, fromIdx) {
  e.stopPropagation();
  // 이미 열려있으면 닫기
  if (openModePickerEl) { openModePickerEl.remove(); openModePickerEl = null; return; }

  const key  = transitKey(currentDay, fromIdx);
  const cur  = transitModes[key] || 'driving';
  const bodyEl = document.getElementById('tc-body-' + fromIdx);
  if (!bodyEl) return;

// 시간 표시 포맷 (HH:MM → 12시간제)
function fmtTime(t) {
  if (!t) return '';
  const [hh, mm] = t.split(':');
  let h = parseInt(hh);
  const ap = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return `${String(h).padStart(2,'0')}:${mm} ${ap}`;
}

// ── 커스텀 시간 선택기 (버튼 그리드 방식) ────────────────────
// 상태 저장: prefix → { h, m, ap }
const tpState = {};
let activeTpPrefix = null;

// "HH:MM" 24시간제 문자열로 변환
function tpToTime(prefix) {
  const s = tpState[prefix];
  if (!s || !s.h) return '';
  let hour = parseInt(s.h);
  if (s.ap === 'PM' && hour !== 12) hour += 12;
  if (s.ap === 'AM' && hour === 12) hour = 0;
  return String(hour).padStart(2,'0') + ':' + s.m;
}

// "HH:MM" → 상태에 복원 후 표시 업데이트
function timeToTp(prefix, timeStr) {
  if (!timeStr) return;
  const [hh, mm] = timeStr.split(':');
  let hour = parseInt(hh);
  const ap = hour >= 12 ? 'PM' : 'AM';
  if (hour > 12) hour -= 12;
  if (hour === 0) hour = 12;
  tpState[prefix] = { h: String(hour), m: mm, ap };
  updateTpDisplay(prefix);
}

// 디스플레이 버튼 텍스트 업데이트
function updateTpDisplay(prefix) {
  const s = tpState[prefix];
  const el = document.getElementById('tp-disp-' + prefix);
  if (!el) return;
  if (s && s.h) {
    el.querySelector('.tp-val').textContent =
      String(s.h).padStart(2,'0') + ':' + s.m + ' ' + s.ap;
  } else {
    el.querySelector('.tp-val').textContent = '시간 선택';
  }
}

// 팝업 내 버튼 선택 상태 동기화
function syncTpPopup(prefix) {
  const s = tpState[prefix] || {};
  document.querySelectorAll(`#tp-pop-${prefix} .tp-btn[data-role="h"]`).forEach(b => {
    b.classList.toggle('sel', b.dataset.val === s.h);
  });
  document.querySelectorAll(`#tp-pop-${prefix} .tp-btn[data-role="m"]`).forEach(b => {
    b.classList.toggle('sel', b.dataset.val === s.m);
  });
  document.querySelectorAll(`#tp-pop-${prefix} .tp-btn[data-role="ap"]`).forEach(b => {
    b.classList.toggle('sel', b.dataset.val === (s.ap || 'AM'));
  });
}

// 팝업 열기
function openTpPopup(prefix, anchorEl, onChange) {
  // 다른 팝업 닫기
  document.querySelectorAll('.tp-popup').forEach(p => p.classList.remove('open'));
  activeTpPrefix = prefix;
  const pop = document.getElementById('tp-pop-' + prefix);
  if (!pop) return;

  // 위치 계산
  const rect = anchorEl.getBoundingClientRect();
  pop.style.top  = (rect.bottom + 6) + 'px';
  pop.style.left = rect.left + 'px';
  // 화면 오른쪽 넘침 방지
  pop.classList.add('open');
  const popRect = pop.getBoundingClientRect();
  if (popRect.right > window.innerWidth - 8) {
    pop.style.left = (window.innerWidth - popRect.width - 8) + 'px';
  }

  syncTpPopup(prefix);
}

// 팝업 닫기
function closeTpPopup(prefix) {
  const pop = document.getElementById('tp-pop-' + prefix);
  if (pop) pop.classList.remove('open');
  activeTpPrefix = null;
}

// 값 선택
function tpSelect(prefix, role, val, onChange) {
  if (!tpState[prefix]) tpState[prefix] = { h: '1', m: '00', ap: 'AM' };
  tpState[prefix][role] = val;
  syncTpPopup(prefix);
  updateTpDisplay(prefix);
  if (onChange) onChange();
}

// 선택기 렌더링 (디스플레이 버튼 + 팝업)
function buildTimePicker(containerId, prefix, onChange) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;

  // 초기 상태: 1시 00분 AM
  if (!tpState[prefix]) tpState[prefix] = { h: '1', m: '00', ap: 'AM' };

  // 시 버튼 (1~12)
  let hBtns = '';
  for (let i = 1; i <= 12; i++) {
    hBtns += `<button class="tp-btn" data-role="h" data-val="${i}"
      onclick="tpSelect('${prefix}','h','${i}',${onChange ? `function(){autoSave()}` : 'null'})"
      >${String(i).padStart(2,'0')}</button>`;
  }

  // 분 버튼 (0,5,10,...,55 → 주요 단위)
  const mins = ['00','05','10','15','20','25','30','35','40','45','50','55'];
  let mBtns = '';
  mins.forEach(m => {
    mBtns += `<button class="tp-btn" data-role="m" data-val="${m}"
      onclick="tpSelect('${prefix}','m','${m}',${onChange ? `function(){autoSave()}` : 'null'})"
      >${m}</button>`;
  });

  // AM/PM 버튼
  const apBtns = ['AM','PM'].map(ap =>
    `<button class="tp-btn ampm" data-role="ap" data-val="${ap}"
      onclick="tpSelect('${prefix}','ap','${ap}',${onChange ? `function(){autoSave()}` : 'null'})"
      >${ap}</button>`
  ).join('');

  wrap.innerHTML = `
    <div class="tp-display" id="tp-disp-${prefix}" onclick="openTpPopup('${prefix}',this,${onChange})">
      <span class="tp-val">시간 선택</span>
      <span class="tp-arrow">▼</span>
    </div>
    <div class="tp-popup" id="tp-pop-${prefix}">
      <div class="tp-section">
        <div class="tp-section-label">시 (Hour)</div>
        <div class="tp-grid hour-grid">${hBtns}</div>
      </div>
      <div class="tp-section">
        <div class="tp-section-label">분 (Minute)</div>
        <div class="tp-grid min-grid">${mBtns}</div>
      </div>
      <div class="tp-section">
        <div class="tp-section-label">AM / PM</div>
        <div class="tp-grid ampm-grid">${apBtns}</div>
      </div>
      <div class="tp-close-row">
        <button class="tp-close-btn" onclick="closeTpPopup('${prefix}')">확인</button>
      </div>
    </div>`;

  updateTpDisplay(prefix);
  syncTpPopup(prefix);
}

// 초기 로드 시 모든 일정 핀을 한눈에
function fitSchedulePins(fallbackTitle) {
  // 맵이 아직 안 로드됐으면 maps-ready 이후에 실행
  if (!map) {
    document.addEventListener('maps-ready', () => fitSchedulePins(fallbackTitle), { once: true });
    return;
  }

  // 모든 날짜의 일정에서 좌표 수집
  const coords = [];
  Object.values(scheduleData).forEach(dayItems => {
    (dayItems || []).forEach(item => {
      if (item.lat && item.lng) coords.push({ lat: item.lat, lng: item.lng });
    });
  });

  if (coords.length === 0) {
    // 핀 없으면 제목으로 지오코딩
    if (fallbackTitle) geocodeAndMoveMap(fallbackTitle);
    return;
  }

  if (coords.length === 1) {
    map.setCenter(coords[0]);
    map.setZoom(13);
    return;
  }

  // 여러 핀 → fitBounds, 단 너무 멀리 퍼진 핀(출발지 등) 제외
  // 핀들의 중심 계산
  const avgLat = coords.reduce((s,c) => s+c.lat, 0) / coords.length;
  const avgLng = coords.reduce((s,c) => s+c.lng, 0) / coords.length;

  // 중심에서 2도(약 200km) 이상 떨어진 핀은 제외 (인천공항 등 출발지 필터)
  const nearby = coords.filter(c =>
    Math.abs(c.lat - avgLat) < 2 && Math.abs(c.lng - avgLng) < 2
  );
  const target = nearby.length >= 2 ? nearby : coords;

  const bounds = new google.maps.LatLngBounds();
  target.forEach(c => bounds.extend(c));
  map.fitBounds(bounds, { top: 60, bottom: 60, left: 40, right: 40 });
}

// 여행 제목으로 지도 위치 자동 이동
function geocodeAndMoveMap(titleText) {
  if (!map || !titleText) return;
  const geocoder = new google.maps.Geocoder();
  // 제목에서 지명 추출 시도 (예: "시즈오카 여행" → "시즈오카")
  const cleaned = titleText.replace(/(여행|trip|travel|투어|tour|\d{4}|🗼|🏔|🌸|✈|🎌)/gi, '').trim();
  geocoder.geocode({ address: cleaned, language: 'ko' }, (results, status) => {
    if (status === 'OK' && results[0]) {
      map.setCenter(results[0].geometry.location);
      map.setZoom(11);
    }
  });
}

function mapZoom(d) { if (map) map.setZoom(map.getZoom() + d); }
function mapFitRoute() {
  if (!map || routePoints.length < 2) return;
  const bounds = new google.maps.LatLngBounds();
  routePoints.forEach(p => bounds.extend(p));
  map.fitBounds(bounds, 60);
}

function drawRoute() {
  if (routePolyline) routePolyline.setMap(null);
  if (routePoints.length < 2) return;
  routePolyline = new google.maps.Polyline({
    path: routePoints,
    geodesic: true,
    strokeColor: '#E07A3A',
    strokeOpacity: 0.85,
    strokeWeight: 4,
    map,
  });
  // 웨이포인트 점
  routePoints.forEach((p, i) => {
    new google.maps.Marker({
      position: p, map,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: i === 0 || i === routePoints.length-1 ? 8 : 5,
        fillColor: i === 0 ? '#3A8FE0' : i === routePoints.length-1 ? '#E03A3A' : '#E07A3A',
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 2,
      },
    });
  });
}

  pinMode = true;
  document.getElementById('map-wrapper').classList.add('pin-mode');
  document.getElementById('pin-mode-banner').classList.add('show');
}

function exitPinMode() {
  pinMode = false;
  document.getElementById('map-wrapper').classList.remove('pin-mode');
  document.getElementById('pin-mode-banner').classList.remove('show');

  // 오버레이 다시 표시
  const overlay = document.getElementById('place-overlay');
  overlay.style.display = '';
  overlay.classList.add('show');
}

function cancelPinMode() {
  if (schPinMode) { exitSchPinMode(); }
  else { exitPinMode(); if (tempPinMarker) { tempPinMarker.setMap(null); tempPinMarker = null; } pendingLatLng = null; }
}

function confirmPinLocation(latLng) {
  pendingLatLng = { lat: latLng.lat(), lng: latLng.lng() };
  // 임시 마커 (낙하 애니메이션)
  if (tempPinMarker) tempPinMarker.setMap(null);
  tempPinMarker = new google.maps.Marker({
    position: pendingLatLng, map,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: '#E07A3A', fillOpacity: 1,
      strokeColor: '#fff', strokeWeight: 3,
    },
    animation: google.maps.Animation.DROP,
  });
  document.getElementById('pl-latlng').value =
    pendingLatLng.lat.toFixed(5) + ', ' + pendingLatLng.lng.toFixed(5);
  // 버튼 업데이트
  const btn = document.getElementById('pl-pick-btn');
  btn.textContent = '✅ 위치 선택됨 (' + pendingLatLng.lat.toFixed(4) + ', ' + pendingLatLng.lng.toFixed(4) + ')';
  btn.classList.add('picked');
  // 저장 버튼 활성화
  const saveBtn = document.getElementById('pl-save-btn');
  saveBtn.disabled = false;
  saveBtn.style.opacity = '1';
  saveBtn.style.cursor = 'pointer';
  exitPinMode();
}
async function savePlaceItem() {
  const name = document.getElementById('pl-name').value.trim();
  if (!name) { showToast('장소명을 입력해주세요'); return; }
  if (!pendingLatLng) { showToast('지도에서 위치를 클릭해주세요'); return; }
  const place = {
    name,
    desc:  document.getElementById('pl-desc').value,
    img:   document.getElementById('pl-img').value || getGooglePhotoUrl(name),
    lat:   pendingLatLng.lat,
    lng:   pendingLatLng.lng,
    createdAt: new Date().toISOString(),
  };
  await window.fbAddPlace(TRIP_ID, place);
  closeOverlay('place-overlay');
  showToast('📍 ' + name + ' 핀이 추가되었습니다');
}
function getGooglePhotoUrl(name) {
  // Google Custom Search로 대체 가능. 기본값으로 placeholder 사용
  return 'https://source.unsplash.com/400x300/?' + encodeURIComponent(name + ' food restaurant');
}

function renderPlaceChips() {
  const c = document.getElementById('place-chips');
  c.innerHTML = '';
  placesData.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'place-chip';
    chip.innerHTML = `<span class="dot"></span>${p.name}`;
    chip.onclick = () => showPlacePopup(p);
    c.appendChild(chip);
  });
}

function renderMapMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (!map) return;
  placesData.forEach(p => {
    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      map,
      title: p.name,
      icon: {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
            <ellipse cx="18" cy="41" rx="7" ry="3" fill="rgba(0,0,0,0.15)"/>
            <path d="M18 2 C9.16 2 2 9.16 2 18 C2 28.5 18 42 18 42 C18 42 34 28.5 34 18 C34 9.16 26.84 2 18 2Z"
                  fill="#E07A3A" stroke="#fff" stroke-width="2"/>
            <circle cx="18" cy="18" r="7" fill="#fff" opacity=".9"/>
            <text x="18" y="22" text-anchor="middle" font-size="10" fill="#E07A3A">🍴</text>
          </svg>`),
        scaledSize: new google.maps.Size(36, 44),
        anchor: new google.maps.Point(18, 44),
      },
    });
    marker.addListener('click', () => showPlacePopup(p));
    markers.push(marker);
  });
}

function showPlacePopup(place) {
  currentPlaceForMaps = place;
  document.getElementById('place-popup-img').src  = place.img || '';
  document.getElementById('place-popup-name').textContent = place.name;
  document.getElementById('place-popup-desc').textContent = place.desc || '';
  openOverlay('place-popup');
  if (map) map.panTo({ lat: place.lat, lng: place.lng });
}
function openGoogleMapsPlace() {
  if (!currentPlaceForMaps) return;
  const q = encodeURIComponent(currentPlaceForMaps.name);
  window.open(`https://www.google.com/maps/search/?api=1&query=${q}`, '_blank');
}

// ── 패널 탭 전환 ──────────────────────────────────────────────
function switchPanelTab(idx) {
  document.querySelectorAll('.panel-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel-page').forEach((p,i) => p.classList.toggle('active', i===idx));
  sessionStorage.setItem('panelTab', idx);
}

// 새로고침 시 마지막 상태 복원
function restoreUIState() {
  const tab = sessionStorage.getItem('panelTab');
  if (tab !== null) switchPanelTab(Number(tab));
  const day = sessionStorage.getItem('currentDay');
  if (day !== null) {
    currentDay = Number(day);
    renderDayTabs();
    renderScheduleList();
  }
}

// ── 여행 설정 위자드 ──────────────────────────────────────────
let currentSetupStep = 1;

function openTripSetup() {
  // 현재 값을 위자드에 미리 채움
  document.getElementById('setup-title').value = document.getElementById('trip-title').value || '';
  document.getElementById('setup-note').value  = document.getElementById('trip-note').value  || '';
  document.getElementById('setup-start').value = document.getElementById('trip-start').value || '';
  document.getElementById('setup-end').value   = document.getElementById('trip-end').value   || '';
  goSetupStep(1);
  openOverlay('trip-setup-overlay');
}

function goSetupStep(step) {
  currentSetupStep = step;
  [1,2,3].forEach(n => {
    document.getElementById('setup-page-' + n).classList.toggle('active', n === step);
    const dot = document.getElementById('step-dot-' + n);
    dot.classList.toggle('active', n === step);
    dot.classList.toggle('done',   n < step);
  });
  if (document.getElementById('step-line-1'))
    document.getElementById('step-line-1').classList.toggle('done', step > 1);
  if (document.getElementById('step-line-2'))
    document.getElementById('step-line-2').classList.toggle('done', step > 2);
}

function setupNext(from) {
  if (from === 1) {
    const title = document.getElementById('setup-title').value.trim();
    if (!title) { showToast('여행 제목을 입력해주세요'); return; }
    goSetupStep(2);
  } else if (from === 2) {
    const s = document.getElementById('setup-start').value;
    const e = document.getElementById('setup-end').value;
    if (!s || !e) { showToast('출발일과 귀국일을 모두 선택해주세요'); return; }
    if (new Date(e) < new Date(s)) { showToast('귀국일이 출발일보다 빠릅니다'); return; }
    // 확인 페이지 채우기
    const sd = new Date(s), ed = new Date(e);
    const diff = Math.round((ed - sd) / 86400000);
    const fmt = d => d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
    document.getElementById('confirm-title').textContent = document.getElementById('setup-title').value;
    document.getElementById('confirm-dates').textContent =
      fmt(sd) + ' ~ ' + fmt(ed) + '  (' + diff + '박 ' + (diff+1) + '일)';
    document.getElementById('confirm-note').textContent  = document.getElementById('setup-note').value || '';
    goSetupStep(3);
  }
}
function setupBack(from) { goSetupStep(from - 1); }

function setupFinish() {
  const title = document.getElementById('setup-title').value.trim();
  const note  = document.getElementById('setup-note').value.trim();
  const start = document.getElementById('setup-start').value;
  const end   = document.getElementById('setup-end').value;

  // 숨김 필드에 값 저장
  document.getElementById('trip-title').value = title;
  document.getElementById('trip-note').value  = note;
  document.getElementById('trip-start').value = start;
  document.getElementById('trip-end').value   = end;

  closeOverlay('trip-setup-overlay');
  updateDuration();
  updateTripSummary();
  autoSave();
  showToast('여행 정보가 저장되었습니다 ✓');
  // 여행 제목으로 지도 자동 이동
  if (map) geocodeAndMoveMap(title);
  else document.addEventListener('maps-ready', () => geocodeAndMoveMap(title), { once: true });
}

function updateTripSummary() {
  const title = document.getElementById('trip-title').value;
  const note  = document.getElementById('trip-note').value;
  const summary = document.getElementById('trip-summary');
  if (title) {
    document.getElementById('summary-title').textContent = title;
    document.getElementById('summary-note').textContent  = note || '';
    summary.style.display = 'block';
  } else {
    summary.style.display = 'none';
  }
  // 헤더 제목도 업데이트
  if (title) document.getElementById('trip-title-display').innerHTML = title + ' <span>✈</span>';
}

// 날짜 입력 시 미리보기
document.addEventListener('DOMContentLoaded', () => {
  ['setup-start','setup-end'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', () => {
      const s = document.getElementById('setup-start').value;
      const e = document.getElementById('setup-end').value;
      const prev = document.getElementById('setup-duration-preview');
      if (s && e && new Date(e) >= new Date(s)) {
        const diff = Math.round((new Date(e)-new Date(s))/86400000);
        const fmt = d => d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
        document.getElementById('setup-dur-text').textContent =
          fmt(new Date(s)) + ' ~ ' + fmt(new Date(e)) + ' · ' + diff + '박 ' + (diff+1) + '일';
        prev.style.display = 'block';
      } else {
        prev.style.display = 'none';
      }
    });
  });
});

function updateAirlineLogo() {
  const v = document.getElementById('flight-airline').value;
  const logo = document.getElementById('airline-logo');
  logo.textContent = v ? v.slice(0,2).toUpperCase() : '✈';
}

// ── 오버레이 유틸 ─────────────────────────────────────────────
function openOverlay(id)  { document.getElementById(id).classList.add('show'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('show'); }
function closeIfBg(e, id) { if (e.target === document.getElementById(id)) closeOverlay(id); }

// ── 토스트 ────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 시작 ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', init);
</script>
